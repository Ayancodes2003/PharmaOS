version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: pharmaos-postgres
    environment:
      POSTGRES_DB: pharma_os
      POSTGRES_USER: pharma_admin
      POSTGRES_PASSWORD: pharma_admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharma_admin -d pharma_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: pharmaos-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: pharma_admin
      MONGO_INITDB_ROOT_PASSWORD: pharma_admin
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongo_data:
